[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = [".venv"]

[tool.ruff.lint]
extend-select = [
  "I", # Import Sorting
  "B" # bugbear(common bugs)
  # Uncomment UP rule to modernize syntax from py 3.9 to py 3.11. 
  # "UP", # Enforce the set target-version syntax standard.
]

ignore = [
  "E501", # line length
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
